schema: spec-driven

context: |
  Tech stack: Astro 6, Tailwind CSS 4, TypeScript (strict)
  Architecture: Astro file-based routing, component-driven (pages, layouts, components)
  Build: Vite with @tailwindcss/vite plugin
  Node: >=22.12.0
  Project: Municipal landing page (muni-landing)
  Testing: None detected
  Linting: None detected

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow Astro conventions (pages/, layouts/, components/)
    - Use Tailwind utility classes for all styling (CSS only for animations)
    - Use TypeScript strict mode
  verify:
    - Run astro build to validate
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
